# PrometheusRule for test alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sre-agent-test-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: sre-agent-test
      rules:
        # Alert when pods are not ready
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="true", namespace="default"} == 0
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 30 seconds."

        # Alert when deployment has unavailable replicas
        - alert: DeploymentReplicasUnavailable
          expr: |
            kube_deployment_status_replicas_unavailable{namespace="default"} > 0
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
            description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} unavailable replicas."

        # Alert when pod is crash looping
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="default"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

        # Alert when deployment has zero replicas
        - alert: DeploymentScaledToZero
          expr: |
            kube_deployment_spec_replicas{namespace="default"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Deployment {{ $labels.deployment }} scaled to zero"
            description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has been scaled to zero replicas."

        # Alert on high restart count
        - alert: HighPodRestartCount
          expr: |
            kube_pod_container_status_restarts_total{namespace="default"} > 3
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} has high restart count"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times."

        # Alert when container is in waiting state
        - alert: ContainerWaiting
          expr: |
            kube_pod_container_status_waiting_reason{namespace="default", reason=~"ImagePullBackOff|ErrImagePull|CrashLoopBackOff"} == 1
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} is waiting"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is waiting due to {{ $labels.reason }}."
